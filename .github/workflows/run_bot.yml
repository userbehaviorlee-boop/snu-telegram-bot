name: SNU 게시판 봇

on:
  schedule:
    # 한국 시간(KST = UTC+9) 기준
    - cron: '0 23 * * *'   # 오전 8시 KST  (전날 23:00 UTC)
    - cron: '0 3 * * *'    # 오후 12시 KST (03:00 UTC)
    - cron: '0 10 * * *'   # 오후 7시 KST  (10:00 UTC)
  workflow_dispatch:         # GitHub 웹에서 수동 실행 버튼

permissions:
  contents: write            # seen_posts.json 커밋을 위한 쓰기 권한

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 봇 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: seen_posts.json 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_posts.json
          git diff --staged --quiet || git commit -m "chore: seen_posts 업데이트"
          git push
